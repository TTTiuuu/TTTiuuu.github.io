<!DOCTYPE html>
<html>
<head>
    <title>Supabase 连接测试</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 40px auto; padding: 20px; }
        .test { margin: 20px 0; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .loading { background: #fff3cd; color: #856404; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        code { background: #f8f9fa; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>Supabase 连接测试</h1>
    
    <div class="test" id="test1">
        <h3>1. 测试基础连接</h3>
        <button onclick="testConnection()">开始测试</button>
        <div id="result1"></div>
    </div>
    
    <div class="test" id="test2">
        <h3>2. 测试 messages 表</h3>
        <button onclick="testMessagesTable()">测试表</button>
        <div id="result2"></div>
    </div>
    
    <div class="test" id="test3">
        <h3>3. 测试插入数据</h3>
        <button onclick="testInsert()">测试插入</button>
        <div id="result3"></div>
    </div>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://xhglunllxuwxgtsezpyi.supabase.co'
        const SUPABASE_KEY = 'sb_publishable_H0C0qjtrwZn52Xc9GO2ufw_6TJNRD7b'
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
        
        function showResult(elementId, message, type = 'info') {
            const el = document.getElementById(elementId)
            el.innerHTML = `<div class="${type}">${message}</div>`
        }
        
        async function testConnection() {
            showResult('result1', '正在连接...', 'loading')
            try {
                // 测试认证服务
                const { error } = await supabase.auth.signInWithPassword({
                    email: 'test@example.com',
                    password: 'wrongpassword'
                })
                
                if (error && error.message.includes('Invalid login credentials')) {
                    showResult('result1', '✅ 连接成功！认证服务正常。', 'success')
                } else if (error) {
                    showResult('result1', `⚠️ ${error.message}`, 'error')
                } else {
                    showResult('result1', '✅ 连接成功', 'success')
                }
            } catch (err) {
                showResult('result1', `❌ 连接失败: ${err.message}`, 'error')
            }
        }
        
        async function testMessagesTable() {
            showResult('result2', '检查表...', 'loading')
            try {
                const { data, error } = await supabase
                    .from('messages')
                    .select('*')
                    .limit(1)
                
                if (error) {
                    if (error.message.includes('relation "messages" does not exist')) {
                        showResult('result2', 
                            '❌ messages 表不存在<br>' +
                            '请在 Supabase SQL 编辑器中执行：<br>' +
                            '<code>CREATE TABLE messages (id BIGSERIAL PRIMARY KEY, name TEXT, message TEXT, created_at TIMESTAMP DEFAULT NOW());</code>',
                            'error')
                    } else {
                        showResult('result2', `❌ ${error.message}`, 'error')
                    }
                } else {
                    showResult('result2', `✅ messages 表存在，有 ${data.length} 条记录`, 'success')
                }
            } catch (err) {
                showResult('result2', `❌ 测试失败: ${err.message}`, 'error')
            }
        }
        
        async function testInsert() {
            showResult('result3', '插入测试数据...', 'loading')
            try {
                const testData = {
                    name: '测试用户',
                    message: '这是一条测试留言 ' + new Date().toLocaleTimeString()
                }
                
                const { data, error } = await supabase
                    .from('messages')
                    .insert([testData])
                    .select()
                
                if (error) {
                    if (error.message.includes('permission denied')) {
                        showResult('result3', 
                            '❌ 插入权限被拒绝<br>' +
                            '需要设置行级安全策略：<br>' +
                            '<code>CREATE POLICY "允许插入消息" ON messages FOR INSERT WITH CHECK (true);</code>',
                            'error')
                    } else {
                        showResult('result3', `❌ ${error.message}`, 'error')
                    }
                } else {
                    showResult('result3', `✅ 插入成功！ID: ${data[0].id}`, 'success')
                }
            } catch (err) {
                showResult('result3', `❌ 插入失败: ${err.message}`, 'error')
            }
        }
        
        // 页面加载时自动测试连接
        window.addEventListener('DOMContentLoaded', testConnection)
    </script>
</body>
</html>
