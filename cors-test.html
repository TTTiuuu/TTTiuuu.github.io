<!DOCTYPE html>
<html>
<head>
    <title>CORS 测试</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .result { padding: 15px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
        .info { background: #d1ecf1; }
    </style>
</head>
<body>
    <h1>CORS 配置测试</h1>
    
    <div id="results"></div>
    
    <script>
        function addResult(message, type = 'info') {
            const div = document.createElement('div')
            div.className = `result ${type}`
            div.innerHTML = message
            document.getElementById('results').appendChild(div)
        }
        
        async function testCORS() {
            addResult('开始测试 CORS 配置...', 'info')
            
            // 测试 1: 直接 fetch
            try {
                const response = await fetch('https://xhglunllxuwxgtsezpyi.supabase.co/rest/v1/messages', {
                    headers: {
                        'apikey': 'sb_publishable_H0C0qjtrwZn52Xc9GO2ufw_6TJNRD7b',
                        'Authorization': 'Bearer sb_publishable_H0C0qjtrwZn52Xc9GO2ufw_6TJNRD7b'
                    }
                })
                
                if (response.ok) {
                    addResult('✅ Fetch 请求成功 - CORS 可能已配置', 'success')
                } else {
                    const text = await response.text()
                    addResult(`⚠️ Fetch 返回 ${response.status}: ${text}`, 'error')
                }
            } catch (error) {
                if (error.message.includes('Failed to fetch') || error.message.includes('CORS')) {
                    addResult('❌ CORS 错误: ' + error.message, 'error')
                    addResult('<strong>需要配置 CORS:</strong><br>' +
                        '1. 登录 Supabase<br>' +
                        '2. Settings → API<br>' +
                        '3. 找到 "Site URL" 或 "Additional URLs"<br>' +
                        '4. 添加: <code>https://tttiuuu.github.io</code><br>' +
                        '5. 保存', 'info')
                } else {
                    addResult('❌ 其他错误: ' + error.message, 'error')
                }
            }
            
            // 测试 2: 使用 Supabase 客户端
            addResult('测试 Supabase 客户端库...', 'info')
            
            // 动态加载 Supabase 库
            const script = document.createElement('script')
            script.src = 'https://unpkg.com/@supabase/supabase-js@2'
            script.onload = async () => {
                const supabase = window.supabase.createClient(
                    'https://xhglunllxuwxgtsezpyi.supabase.co',
                    'sb_publishable_H0C0qjtrwZn52Xc9GO2ufw_6TJNRD7b'
                )
                
                try {
                    const { data, error } = await supabase
                        .from('messages')
                        .select('count', { count: 'exact', head: true })
                    
                    if (error) {
                        if (error.message.includes('CORS') || error.message.includes('origin')) {
                            addResult('❌ Supabase 客户端 CORS 错误', 'error')
                        } else {
                            addResult(`⚠️ 其他错误: ${error.message}`, 'error')
                        }
                    } else {
                        addResult('✅ Supabase 客户端连接成功', 'success')
                    }
                } catch (err) {
                    addResult('❌ 客户端测试异常: ' + err.message, 'error')
                }
            }
            document.head.appendChild(script)
        }
        
        // 运行测试
        window.addEventListener('DOMContentLoaded', testCORS)
    </script>
</body>
</html>
